<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Web - Speech to Text</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }
    .recording {
      animation: pulse-ring 1.5s infinite;
    }
    .progress-bar {
      transition: width 0.3s ease;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-4 px-4 lg:py-8">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-4 lg:mb-8">
      <div class="flex justify-between items-center mb-2">
        <div class="flex-1"></div>
        <h1 class="text-2xl lg:text-4xl font-bold text-gray-800 flex-1">Whisper Web</h1>
        <div class="flex-1 flex justify-end">
          <button id="settingsBtn" class="px-3 py-1.5 lg:px-4 lg:py-2 bg-gray-600 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
            Settings
          </button>
        </div>
      </div>
      <p class="text-sm text-gray-500">Powered by Groq Whisper Large v3</p>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-xl p-6 lg:p-8 max-w-lg w-full mx-4">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Settings</h2>

        <!-- API Key Input -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Groq API Key
          </label>
          <input
            type="password"
            id="apiKeyInput"
            placeholder="Enter your Groq API key"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
          <p class="text-xs text-gray-500 mt-2">
            Get your free API key at <a href="https://console.groq.com" target="_blank" class="text-blue-600 hover:underline">console.groq.com</a>
            <br>Your key is stored locally in your browser.
          </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-end gap-3">
          <button id="closeSettingsBtn" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg font-medium hover:bg-gray-300 transition-colors">
            Close
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content: two-column in landscape, single column in portrait -->
    <div class="flex flex-col lg:flex-row gap-4 lg:gap-6">

      <!-- Left Column: Controls -->
      <div class="bg-white rounded-lg shadow-lg p-4 lg:p-6 lg:w-1/3">
        <!-- Recording Controls + Dropdowns -->
        <div class="mb-4">
          <button id="recordBtn" class="w-full px-6 py-3 bg-green-500 text-white rounded-lg font-medium hover:bg-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Start Recording
          </button>
        </div>

        <div class="flex gap-3 mb-4">
          <div class="flex-1">
            <label class="block text-xs font-semibold text-gray-500 mb-1">Language</label>
            <select id="languageSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="es">Español</option>
              <option value="auto">Auto</option>
            </select>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-gray-500 mb-1">Task</label>
            <select id="taskSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              <option value="transcribe">Transcribe</option>
              <option value="translate">Translate</option>
            </select>
          </div>
        </div>

        <!-- Audio Level Meter -->
        <div id="levelMeterSection" class="mb-4 hidden">
          <label class="block text-xs font-semibold text-gray-500 mb-1">Audio Level</label>
          <canvas id="levelMeter" class="w-full rounded-lg bg-gray-100" height="24"></canvas>
        </div>

        <!-- Audio Preview -->
        <div id="mediaPreview" class="mb-4 hidden">
          <label class="block text-xs font-semibold text-gray-500 mb-1">Preview</label>
          <audio id="audioPlayer" controls class="w-full"></audio>
        </div>

        <!-- Transcription Progress -->
        <div id="transcribeProgress" class="mb-4 hidden">
          <div class="flex justify-between items-center mb-1">
            <span class="text-xs font-medium text-gray-500">Processing</span>
            <span class="text-xs font-medium text-green-600">...</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div class="progress-bar bg-green-600 h-2 rounded-full animate-pulse" style="width: 100%"></div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3">
          <button id="copyBtn" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            Copy
          </button>
          <button id="clearBtn" class="flex-1 px-4 py-2 bg-gray-600 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
            Clear
          </button>
        </div>

        <!-- Status Area -->
        <div class="mt-4">
          <div id="statusArea" class="space-y-2"></div>
        </div>
      </div>

      <!-- Right Column: Transcript -->
      <div class="bg-white rounded-lg shadow-lg p-4 lg:p-6 flex-1 flex flex-col">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Transcript</label>
        <textarea
          id="transcript"
          class="w-full flex-1 min-h-[200px] lg:min-h-0 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
          placeholder="Transcription will appear here..."
        ></textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-4 lg:mt-8 text-xs text-gray-500">
      <p>Powered by <a href="https://groq.com" target="_blank" class="text-blue-600 hover:underline">Groq API</a> &middot; Whisper Large v3</p>
    </div>
  </div>

  <script>
    // State
    let apiKey = localStorage.getItem('groqApiKey') || '';

    let micStream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentAudioBlob = null;
    let isRecording = false;
    let audioAnalyser = null;
    let analyserContext = null;
    let levelAnimationId = null;

    // DOM Elements
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');

    const languageSelect = document.getElementById('languageSelect');
    const taskSelect = document.getElementById('taskSelect');
    const recordBtn = document.getElementById('recordBtn');

    const levelMeterSection = document.getElementById('levelMeterSection');
    const levelMeter = document.getElementById('levelMeter');
    const levelCtx = levelMeter.getContext('2d');

    const mediaPreview = document.getElementById('mediaPreview');
    const audioPlayer = document.getElementById('audioPlayer');

    const transcribeProgress = document.getElementById('transcribeProgress');
    const transcript = document.getElementById('transcript');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusArea = document.getElementById('statusArea');

    // Status message helper
    function showStatus(message, type = 'info') {
      const statusDiv = document.createElement('div');
      const colors = {
        info: 'bg-blue-100 text-blue-800 border-blue-200',
        success: 'bg-green-100 text-green-800 border-green-200',
        error: 'bg-red-100 text-red-800 border-red-200',
        warning: 'bg-yellow-100 text-yellow-800 border-yellow-200',
      };

      statusDiv.className = `px-3 py-2 rounded-lg border ${colors[type]} text-xs`;
      statusDiv.textContent = message;
      statusArea.prepend(statusDiv);

      setTimeout(() => {
        statusDiv.remove();
      }, 5000);
    }

    // Settings modal handlers
    settingsBtn.addEventListener('click', () => {
      apiKeyInput.value = apiKey;
      settingsModal.classList.remove('hidden');
    });

    closeSettingsBtn.addEventListener('click', () => {
      settingsModal.classList.add('hidden');
    });

    // Auto-save API key on any input (typing, paste, etc.)
    ['input', 'paste', 'change'].forEach(event => {
      apiKeyInput.addEventListener(event, () => {
        setTimeout(() => {
          apiKey = apiKeyInput.value.trim();
          localStorage.setItem('groqApiKey', apiKey);
        }, 0);
      });
    });

    // Audio level meter
    function startLevelMeter(stream) {
      analyserContext = new AudioContext();
      const source = analyserContext.createMediaStreamSource(stream);
      audioAnalyser = analyserContext.createAnalyser();
      audioAnalyser.fftSize = 256;
      source.connect(audioAnalyser);

      levelMeterSection.classList.remove('hidden');
      levelMeter.width = levelMeter.offsetWidth;

      const dataArray = new Uint8Array(audioAnalyser.frequencyBinCount);

      function draw() {
        levelAnimationId = requestAnimationFrame(draw);
        audioAnalyser.getByteFrequencyData(dataArray);

        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
        const level = avg / 255;

        const w = levelMeter.width;
        const h = levelMeter.height;
        levelCtx.clearRect(0, 0, w, h);

        levelCtx.fillStyle = '#f3f4f6';
        levelCtx.fillRect(0, 0, w, h);

        const barWidth = level * w;
        const gradient = levelCtx.createLinearGradient(0, 0, w, 0);
        gradient.addColorStop(0, '#22c55e');
        gradient.addColorStop(0.6, '#eab308');
        gradient.addColorStop(1, '#ef4444');
        levelCtx.fillStyle = gradient;
        levelCtx.fillRect(0, 0, barWidth, h);
      }

      draw();
    }

    function stopLevelMeter() {
      if (levelAnimationId) {
        cancelAnimationFrame(levelAnimationId);
        levelAnimationId = null;
      }
      if (analyserContext) {
        analyserContext.close();
        analyserContext = null;
      }
      audioAnalyser = null;
      levelMeterSection.classList.add('hidden');
    }

    // Convert audio blob to WAV for reliable API transcription
    async function convertToWav(blob) {
      const audioContext = new AudioContext();
      const arrayBuffer = await blob.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      const numChannels = 1;
      const sampleRate = 16000;
      const offlineCtx = new OfflineAudioContext(numChannels, audioBuffer.duration * sampleRate, sampleRate);

      const source = offlineCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(offlineCtx.destination);
      source.start();

      const rendered = await offlineCtx.startRendering();
      const pcmData = rendered.getChannelData(0);

      const wavBuffer = new ArrayBuffer(44 + pcmData.length * 2);
      const view = new DataView(wavBuffer);

      const writeString = (offset, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 36 + pcmData.length * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * numChannels * 2, true);
      view.setUint16(32, numChannels * 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, pcmData.length * 2, true);

      for (let i = 0; i < pcmData.length; i++) {
        const s = Math.max(-1, Math.min(1, pcmData[i]));
        view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }

      await audioContext.close();
      return new Blob([wavBuffer], { type: 'audio/wav' });
    }

    // Transcription function
    async function transcribeAudio() {
      if (!currentAudioBlob) {
        showStatus('No audio to transcribe', 'error');
        return;
      }

      if (!apiKey) {
        showStatus('Please configure your API key in settings', 'error');
        settingsModal.classList.remove('hidden');
        return;
      }

      try {
        transcribeProgress.classList.remove('hidden');
        transcript.value = '';

        const task = taskSelect.value;
        showStatus(task === 'translate' ? 'Translating...' : 'Transcribing...', 'info');

        const wavBlob = await convertToWav(currentAudioBlob);
        const formData = new FormData();
        formData.append('file', wavBlob, 'audio.wav');
        formData.append('model', 'whisper-large-v3');
        const selectedLang = languageSelect.value;
        if (selectedLang !== 'auto') {
          formData.append('language', selectedLang);
        }

        const apiEndpoint = task === 'translate'
          ? 'https://api.groq.com/openai/v1/audio/translations'
          : 'https://api.groq.com/openai/v1/audio/transcriptions';
        const response = await fetch(apiEndpoint, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
          },
          body: formData,
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error?.message || 'Request failed');
        }

        const result = await response.json();
        transcript.value = result.text;
        copyBtn.disabled = false;
        transcribeProgress.classList.add('hidden');

        try {
          await navigator.clipboard.writeText(result.text);
          showStatus('Done — copied to clipboard', 'success');
        } catch {
          showStatus('Done', 'success');
        }

      } catch (error) {
        transcribeProgress.classList.add('hidden');
        showStatus(`Failed: ${error.message}`, 'error');
        console.error('Transcription error:', error);
      }
    }

    // Initialize persistent mic stream
    async function initMicStream() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 16000,
          }
        });
        showStatus('Microphone ready', 'success');
      } catch (error) {
        showStatus(`Microphone access failed: ${error.message}`, 'error');
        console.error('Mic init error:', error);
      }
    }

    // Recording functionality
    recordBtn.addEventListener('click', async () => {
      if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        stopLevelMeter();

        recordBtn.textContent = 'Start Recording';
        recordBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'recording');
        recordBtn.classList.add('bg-green-500', 'hover:bg-green-600');

        showStatus('Recording stopped', 'success');
        return;
      }

      try {
        if (!micStream || !micStream.active) {
          await initMicStream();
        }
        if (!micStream) return;

        mediaRecorder = new MediaRecorder(micStream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          currentAudioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          const audioUrl = URL.createObjectURL(currentAudioBlob);
          audioPlayer.src = audioUrl;
          mediaPreview.classList.remove('hidden');

          await transcribeAudio();
        };

        mediaRecorder.start(250);
        isRecording = true;
        startLevelMeter(micStream);

        recordBtn.textContent = 'Stop Recording';
        recordBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
        recordBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'recording');

        showStatus('Recording...', 'info');
      } catch (error) {
        showStatus(`Recording failed: ${error.message}`, 'error');
        console.error('Recording error:', error);
      }
    });

    // Copy to clipboard
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(transcript.value);
        showStatus('Copied to clipboard', 'success');
      } catch (error) {
        showStatus('Copy failed', 'error');
      }
    });

    // Clear all
    clearBtn.addEventListener('click', () => {
      currentAudioBlob = null;
      audioChunks = [];
      transcript.value = '';
      audioPlayer.src = '';
      mediaPreview.classList.add('hidden');
      copyBtn.disabled = true;

      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        stopLevelMeter();
        recordBtn.textContent = 'Start Recording';
        recordBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'recording');
        recordBtn.classList.add('bg-green-500', 'hover:bg-green-600');
      }

      showStatus('Cleared', 'info');
    });

    // Initialize on load
    window.addEventListener('load', async () => {
      await initMicStream();

      if (!apiKey) {
        showStatus('Set your Groq API key in Settings to get started', 'warning');
      }
    });
  </script>
</body>
</html>
